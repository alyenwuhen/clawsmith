<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>clawsmith viewer</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; }
    pre { background: #111; color: #eee; padding: 16px; border-radius: 8px; overflow: auto; }
    input, button { font-size: 14px; padding: 8px; }
  </style>
</head>
<body>
  <h1>clawsmith viewer</h1>
  <p>Open a trace by ID.</p>
  <input id="traceId" placeholder="trace id" />
  <button id="loadBtn">Load</button>
  <pre id="out">No trace loaded.</pre>
  <script>
    document.getElementById('loadBtn').onclick = async () => {
      const traceId = document.getElementById('traceId').value.trim();
      if (!traceId) return;
      const r = await fetch(`/plugins/clawsmith/trace/${encodeURIComponent(traceId)}`);
      const j = await r.json();
      document.getElementById('out').textContent = JSON.stringify(j, null, 2);
    };
  </script>
</body>
</html>
